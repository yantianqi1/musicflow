# MusicFlow Docker Compose
# 部署: docker compose up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: musicflow-backend:latest
    container_name: musicflow-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内路径固定
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/musicflow.db}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    expose:
      - "3433"
    # 如需直接从宿主机访问后端，取消注释 ports
    # ports:
    #   - "3433:3433"
    networks:
      - musicflow-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3433/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: musicflow-frontend:latest
    container_name: musicflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3444}:80"
    networks:
      - musicflow-net

networks:
  musicflow-net:
    driver: bridge
